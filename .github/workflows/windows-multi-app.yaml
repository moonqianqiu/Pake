name: Build Multi Apps (Windows Only)

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-multi-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Multi Apps (Windows, Serial)
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ 统一交给 composite action：pnpm + node(cache: pnpm) + pnpm install + rust + wix + sccache + rust-cache
      - name: Setup Environment (Node/Rust/System + Cache + sccache)
        uses: ./.github/actions/setup-env
        with:
          mode: build

      # Build CLI (once)
      - name: Build CLI (once)
        shell: pwsh
        run: pnpm run cli:build

      - name: Verify CLI
        shell: pwsh
        run: |
          if (Test-Path dist) { Get-ChildItem dist -Force | Format-Table -AutoSize }
          if (-not (Test-Path "dist/cli.js")) { throw "dist/cli.js not found" }

      - name: Build Apps (Windows, Serial) -> ZIP portable
        shell: pwsh
        timeout-minutes: 160
        run: |
          $apps = @(
            @{ title="DouBao";      name="DouBao";      url="https://www.doubao.com/chat";    icon="https://raw.githubusercontent.com/moonqianqiu/STORE/refs/heads/main/ICONS/doubao_128.ico" },
            # @{ title="Kimi";        name="Kimi";        url="https://www.kimi.com";          icon="https://raw.githubusercontent.com/moonqianqiu/STORE/refs/heads/main/ICONS/kimi_128.ico" },
            @{ title="Qwen";        name="Qwen";        url="https://chat.qwen.ai";          icon="https://raw.githubusercontent.com/moonqianqiu/STORE/refs/heads/main/ICONS/qwen_128.ico" },
            @{ title="Z";           name="Z";           url="https://chat.z.ai";             icon="https://raw.githubusercontent.com/moonqianqiu/STORE/refs/heads/main/ICONS/z_128.ico" },
            @{ title="Minimax";     name="Minimax";     url="https://agent.minimaxi.com";    icon="https://raw.githubusercontent.com/moonqianqiu/STORE/refs/heads/main/ICONS/minimax_128.ico" },
            @{ title="HuggingChat"; name="HuggingChat"; url="https://huggingface.co/chat";   icon="https://raw.githubusercontent.com/moonqianqiu/STORE/refs/heads/main/ICONS/huggingface_128.ico" }
          )

          New-Item -Path "output\windows" -ItemType Directory -Force | Out-Null

          # ✅ “独立但可复用”：
          # - 共享 Rust 编译缓存：所有 app 共用一个 CARGO_TARGET_DIR（放 src-tauri\target 下，swatinem/rust-cache 更容易命中）
          # - 避免串味：每轮只清理 bundle 等容易相互影响的输出目录
          $tauriTargetRoot = Resolve-Path "src-tauri\target"
          $sharedTargetDir = Join-Path $tauriTargetRoot "shared"
          New-Item -ItemType Directory -Path $sharedTargetDir -Force | Out-Null
          $env:CARGO_TARGET_DIR = $sharedTargetDir

          foreach ($app in $apps) {
            Write-Host "`n=============================="
            Write-Host "Building: $($app.title)"
            Write-Host "=============================="

            $zipPath = "output\windows\$($app.title)_x64.zip"
            if (Test-Path $zipPath) { Remove-Item -Force $zipPath }

            $releaseDir = Join-Path $sharedTargetDir "release"
            $bundleDir  = Join-Path $releaseDir "bundle"

            # ✅ 只清理 tauri bundle 输出，避免打包信息/安装包串
            if (Test-Path $bundleDir) { Remove-Item -Recurse -Force $bundleDir -ErrorAction SilentlyContinue }

            # 可选：清理 release 下的 msi（不删除 exe，靠精确定位取正确 exe）
            if (Test-Path $releaseDir) {
              Get-ChildItem -Path $releaseDir -Filter "*.msi" -ErrorAction SilentlyContinue | Remove-Item -Force -ErrorAction SilentlyContinue
            }

            $args = @(
              $app.url,
              "--name", $app.name,
              "--icon", $app.icon,
              "--width", "1366",
              "--height", "768",
              "--targets", "x64"
            )

            Write-Host "Running: node dist/cli.js $($args -join ' ')"
            node dist/cli.js $args
            if ($LASTEXITCODE -ne 0) { throw "Build failed for $($app.title)" }

            # ✅ 精准取 exe：release\<name>.exe
            $expectedExe = Join-Path $releaseDir "$($app.name).exe"
            if (-not (Test-Path $expectedExe)) {
              # 兜底：只在 release 目录找最新 exe（不跨目录）
              $exeFallback = Get-ChildItem -Path $releaseDir -Filter "*.exe" -ErrorAction SilentlyContinue |
                Sort-Object LastWriteTime -Descending |
                Select-Object -First 1

              if (-not $exeFallback) {
                Write-Error "No EXE found for $($app.title)"
                Write-Host "Expected: $expectedExe"
                Write-Host "Searched: $releaseDir\*.exe"
                exit 1
              }
              $exePath = $exeFallback.FullName
              Write-Warning "Expected exe not found; fallback to newest: $exePath"
            } else {
              $exePath = $expectedExe
            }

            # --- Package as ZIP: unzip to run ---
            $tmpDir = Join-Path $env:RUNNER_TEMP "pake_portable_$($app.title)"
            if (Test-Path $tmpDir) { Remove-Item -Recurse -Force $tmpDir }
            New-Item -ItemType Directory -Path $tmpDir | Out-Null

            Copy-Item $exePath -Destination (Join-Path $tmpDir "$($app.title).exe") -Force
            Compress-Archive -Path (Join-Path $tmpDir "*") -DestinationPath $zipPath -Force

            # 保持仓库干净（如果 cli 会改 lock）
            git restore --worktree --staged src-tauri/Cargo.lock 2>$null | Out-Null

            Write-Host "Done: $zipPath (from $exePath)"
          }

      # ✅ 输出 sccache 命中率（setup-env 已经装好并启用）
      - name: sccache stats
        shell: pwsh
        run: |
          if (Get-Command sccache -ErrorAction SilentlyContinue) {
            sccache --show-stats
            sccache --version
          } else {
            Write-Warning "sccache not found in PATH"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-5-apps-${{ github.run_number }}-${{ github.sha }}
          path: output/windows/*.zip
          retention-days: 3
